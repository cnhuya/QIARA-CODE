[toolchain]

[features]
resolution = true
skip-lint = false

# Tell Anchor which program ID belongs to which program
# The key (qiara_interface) must match your directory name in /programs/ (with hyphens replaced by underscores)
[programs.localnet]
qiara_interface = "E3mfX19ZD6m9s4TPmM9jLW8kVmEfs8PtVGvviT1DDKzM"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"                  # Or "devnet" when you are ready to deploy online
wallet = "~/.config/solana/id.json"   # The path to the wallet you created earlier

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
